<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Photon Game Simulator</title>
	<link rel="stylesheet" href="index.css">
</head>
<body>
	<button style="float: right;" onclick="toggleTheme()">Theme</button>
	<div>
		<button onclick="back()" title="Go back one tick">Back</button>
		<button onclick="stop()" title="Stop simulating">Stop</button>
		<button onclick="stop(); step()" title="Go forward one tick">Step</button>
		<button onclick="go(1000)" title="Run simulation at slow speed">Slow</button>
		<button onclick="go(100)" title="Run simulation at medium speed">Medium</button>
		<button onclick="go(10)" title="Run simulation at fast speed">Fast</button>
		<button onclick="go(0)" title="Run simulation at maximum speed">Maximum</button>
	</div>
	<div>
		<button onclick="toggleGrid()" title="Draw a grid which clarifies the orientation of cells">Show Grid</button>
		<button onclick="cursorMode = 1" title="Draw photons by clicking and erase by right-clicking">Draw Photons</button>
		<button onclick="cursorMode = 2" title="Draw devices by clicking and erase by right-clicking">Draw Device</button>
	</div>
	<canvas
		id="canvas"
		onwheel="zoomIn(event)"
		onmousemove="mouse(event)"
		onmousedown="mouse(event)"
		onmouseup="mouse(event)"
		onmouseleave="mouse(event)"
		oncontextmenu="event.preventDefault()"
	>
	</canvas>
	<div>
		<input type="number" id="width" value="1" min="1" title="Width of the simulation field">
		x
		<input type="number" id="height" value="1" min="1" title="Height of the simulation field">
		<button onclick="reset()" title="Reset to a blank field with the given size">Reset</button>
	</div>
	<div>
		<button onclick="share()" title="Create copyable URL and image representations of the current state of the simulation">Share</button>
	</div>
	<div>
		<a id="copyable-link" href="" target="_blank"></a>
	</div>
	<div>
		<canvas id="copyable-canvas" width="0" height="0"></canvas>
	</div>
	<div>
		<span id="share-message"></span>
	</div>
	<script src="index.js"></script>
</body>
</html>
